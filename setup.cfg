[flake8]
max-line-length = 120
exclude =
    migrations,
    __pycache__,
    .git,
    .venv

[isort]
profile = black
known_django = django
known_drf = rest_framework
sections = FUTURE,STDLIB,THIRDPARTY,known_django,known_drf,FIRSTPARTY,LOCALFOLDER

[coverage:run]
source = .
omit =
    */migrations/*
    */tests/*
    manage.py
    dag_manager/wsgi.py
    dag_manager/asgi.py

[coverage:report]
show_missing = true
fail_under = 80
